<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draw Me Dis!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="window">
    <div class="title-bar">
      <span class="title-bar-text">Draw Me Dis! v1.0</span>
      <div class="title-bar-buttons">
        <button class="title-btn">_</button>
        <button class="title-btn">&#9633;</button>
        <button class="title-btn">X</button>
      </div>
    </div>

    <div class="window-body">

      <h1 class="rainbow-text">Draw Me Dis!</h1>
      <p class="subtitle">Your tiny digital paint-night instructor</p>

      <div class="marquee-wrap">
        <marquee class="marquee">
          &#x2728; WELCOME TO DRAW ME DIS! &#x2728; &nbsp;&nbsp;&nbsp;
          GET YOUR DOODLE ON! &#x1F58A;&#xFE0F; &nbsp;&nbsp;&nbsp;
          ART IS FOR EVERYONE! &#x1F3A8; &nbsp;&nbsp;&nbsp;
        </marquee>
      </div>

      <div class="card" id="idea-card">
        <p id="idea-display">Press the button below to get your doodle idea!</p>
      </div>

      <button class="btn btn-primary" id="generate-btn" onclick="generateIdea()">
        &#x1F3B2; Give me a doodle!
      </button>

      <div id="steps-section" class="hidden">
        <div class="card step-card">
          <span class="step-label" id="step-label">Step 1</span>
          <p id="step-display"></p>
        </div>

        <button class="btn btn-secondary" id="next-btn" onclick="showNextStep()">
          Next Step &rarr;
        </button>
      </div>

      <div id="name-section" class="hidden">
        <div class="card">
          <label for="doodle-name" class="field-label">&#x1F31F; Name your masterpiece:</label>
          <input
            type="text"
            id="doodle-name"
            class="text-input"
            placeholder="e.g. Teacup Mouse Supreme"
            maxlength="60"
          >
          <button class="btn btn-success" onclick="saveName()">Save Name!</button>
          <p id="name-result" class="name-result hidden"></p>
        </div>
      </div>

      <button class="btn btn-reset hidden" id="reset-btn" onclick="resetDoodle()">
        &#x1F504; Start Over
      </button>

      <div class="footer">
        <span class="blink-badge">NEW!</span>
        Best viewed in 800x600 &mdash; Made with &#x2665; and nostalgia
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
