<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw Me Dis!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Star field lives behind everything -->
  <div id="starField" aria-hidden="true"></div>

  <div class="page">

    <div class="header-area">
      <span class="app-title">draw me dis!</span>
      <span class="sparkle">✦</span>
    </div>

    <div class="note-wrapper">
      <div class="sticky-note" id="stickyNote">

        <div class="progress-bar-track" id="progressTrack">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>

        <div class="note-content" id="noteContent">
          <!-- filled by JS -->
        </div>

      </div>
    </div>

    <div class="deco-bottom">
      <span>✦</span>
      <span>· · ·</span>
      <span>✦</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
